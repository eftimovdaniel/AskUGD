# Lokalna baza za testiranje:
#   docker compose up -d          -> startuva Qdrant na http://localhost:6333
#   docker compose down           -> zapira (podatocite ostanuvaat vo volume)
#   docker compose down -v        -> zapira + BRISHE sè
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"               # REST API + dashboard
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # Odkomentiraj koga kje ti treba (2+ workers):
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped

volumes:
  qdrant_data:
